<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flower Shop{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>🌸 Flower Shop</h1>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('order_history') }}">Order History</a>
            <a href="{{ url_for('invoices') }}">Invoices</a>
        </nav>
    </header>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="background-color: #d4edda; color: #155724; padding: 10px; border-radius: 5px;">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <footer>
        <p>&copy; 2026 Flower Shop - CSC2 Project</p>
    </footer>
</body>
</html>
